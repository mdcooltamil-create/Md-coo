<div class="tracking-container" style="text-align: center; margin: 20px 0; font-family: 'Segoe UI', sans-serif;">
    
    <div onclick="openSTTrack()" style="
        background-color: white; 
        color: #37474f; 
        border: 6px solid #282828; 
        border-radius: 40px; 
        padding: 12px 20px; 
        font-size: 22px; 
        font-weight: bold; 
        cursor: pointer;
        display: inline-block;
        width: 80%;
        max-width: 340px;
        text-decoration: none;
        box-sizing: border-box;
        transition: 0.3s;">
        ST COURIER TRACKING
    </div>
</div>

<script>
function openSTTrack() {
    // ஒரு சிறிய விண்டோ மூலம் நம்பரை கேட்கும்
    var trackId = prompt("Enter ST Courier Tracking Number:");
    
    if (trackId != null && trackId.trim() !== "") {
        // நம்பரை உள்ளிட்டவுடன் ST Courier தளத்திற்கு கூட்டிச் செல்லும்
        var url = "https://stcourier.com/track/details?shipment_id=" + trackId.trim();
        window.open(url, '_blank');
    }
}
</script>
